<body>

<hr>

<h2>➕ Шинэ манга нэмэх</h2>

<input id="title" placeholder="Манганы нэр">
<input id="img" placeholder="Зургийн зам (images/...)">

<button onclick="addManga()">Нэмэх</button>

<script>

function addManga(){

let title = document.getElementById("title").value;
let img = document.getElementById("img").value;

let id = title.replaceAll(" ","").toLowerCase()

document.getElementById("mangaList").innerHTML +=

`<div class="card">

<a href="taiz1.html?manga=${id}">
<img src="${img}" width="150">
</a>

<h3>${title}</h3>

<button onclick="this.parentElement.remove()">❌ Устгах</button>

</div>`;

}

</script>

</body>
</html>
